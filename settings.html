<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Settings - issnowLauncher Addon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      /* Dark Theme */
      --bg-main-dark: #0b0d14;
      --bg-card-dark: #11131c;
      --text-main-dark: #f5f7ff;
      --text-sub-dark: #a4acc4;
      --border-dark: rgba(255,255,255,0.08);

      /* Light Theme */
      --bg-main-light: #e7ecf5;
      --bg-card-light: #ffffff;
      --text-main-light: #1b1e2b;
      --text-sub-light: #5c6278;
      --border-light: rgba(0,0,0,0.08);

      --accent: #4cc9f0;
      --accent-soft: rgba(76,201,240,0.12);
      --radius-lg: 16px;
      --radius-md: 10px;
      --font-main: system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: var(--font-main);
    }

    /* ===== THEME ===== */
    body[data-theme="dark"] {
      background: var(--bg-main-dark);
      color: var(--text-main-dark);
    }

    body[data-theme="light"] {
      background: var(--bg-main-light);
      color: var(--text-main-light);
    }

    body[data-theme="dark"] .panel {
      background: var(--bg-card-dark);
      border: 1px solid var(--border-dark);
    }

    body[data-theme="light"] .panel {
      background: var(--bg-card-light);
      border: 1px solid var(--border-light);
    }

    /* ===== Layout ===== */
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px;
    }

    .panel {
      padding: 20px;
      border-radius: var(--radius-lg);
      backdrop-filter: blur(16px);
      margin-bottom: 20px;
    }

    .title {
      font-size: 1.2rem;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 10px rgba(76,201,240,0.8);
    }

    .setting-item {
      margin: 14px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.95rem;
    }

    .setting-label {
      opacity: 0.85;
    }

    /* Switch UI */
    .switch {
      position: relative;
      width: 46px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #777;
      border-radius: 24px;
      transition: .3s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: .3s;
    }

    input:checked + .slider {
      background: var(--accent);
    }

    input:checked + .slider:before {
      transform: translateX(22px);
    }

    .back-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 16px;
      border-radius: var(--radius-md);
      background: var(--accent-soft);
      color: var(--accent);
      text-decoration: none;
      border: 1px solid rgba(76,201,240,0.4);
    }
  </style>
</head>

<body data-theme="dark">
  <div class="container">

    <div class="panel">
      <div class="title">
        <span class="dot"></span>
        <span>設定</span>
      </div>

          <h1>This page is Not yet synced</h1>

        <a href="index.html" class="back-btn">← Panel に戻る</a>

      </div>

</body>
</html>
